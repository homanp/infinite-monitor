services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

  app:
    build: .
    container_name: infinite-monitor
    restart: unless-stopped
    network_mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - app-data:/app/data
    environment:
      - DATABASE_PATH=/app/data/widgets.db
      - HOSTNAME=0.0.0.0
    depends_on:
      widget-base:
        condition: service_completed_successfully

  widget-base:
    build: ./docker/widget-base
    image: widget-base:latest
    container_name: widget-base-builder
    command: ["echo", "Base image ready"]

volumes:
  app-data:
  caddy-data:
  caddy-config:
